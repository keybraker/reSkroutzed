name: Release & Publish

# Triggered when a version tag (v1.2.3) is pushed.
# Builds, tests, creates a GitHub Release, and publishes to both stores.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create GitHub Releases

    steps:
      # ── Resolve the tag (manual dispatch or tag push) ──
      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # ── Checkout the tagged commit ──
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # ── Version sanity check ──
      - name: Verify Version Consistency
        run: |
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          CLEAN_TAG="${TAG_VERSION#v}"

          PKG_VERSION=$(node -p "require('./package.json').version")
          CHROME_VERSION=$(node -p "require('./manifests/manifest_chrome.json').version")
          FIREFOX_VERSION=$(node -p "require('./manifests/manifest_firefox.json').version")

          FAIL=0

          if [ "$CLEAN_TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag ($CLEAN_TAG) != package.json ($PKG_VERSION)"
            FAIL=1
          fi
          if [ "$CLEAN_TAG" != "$CHROME_VERSION" ]; then
            echo "::error::Tag ($CLEAN_TAG) != manifest_chrome.json ($CHROME_VERSION)"
            FAIL=1
          fi
          if [ "$CLEAN_TAG" != "$FIREFOX_VERSION" ]; then
            echo "::error::Tag ($CLEAN_TAG) != manifest_firefox.json ($FIREFOX_VERSION)"
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Version mismatch. Run: npm run version:set -- $CLEAN_TAG"
            exit 1
          fi

          echo "✅ All version fields match: $CLEAN_TAG"

      # ── Quality gate: tests must pass ──
      - name: Run Tests
        run: npm test

      # ── Build both browsers ──
      - name: Build Extensions
        run: npm run build

      # ── GitHub Release with both zips ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            build/chrome_build.zip
            build/firefox_build.zip
          generate_release_notes: true

      # ── Chrome Web Store ──
      - name: Publish to Chrome Web Store
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          npx chrome-webstore-upload \
            --source build/chrome_build.zip \
            --extension-id "$EXTENSION_ID"

      # ── Firefox Add-ons (AMO) ──
      - name: Publish to Firefox Add-ons
        run: |
          npx web-ext sign \
            --channel=listed \
            --api-key="${{ secrets.FIREFOX_JWT_ISSUER }}" \
            --api-secret="${{ secrets.FIREFOX_JWT_SECRET }}" \
            --source-dir=build/firefox_build \
            --artifacts-dir=build/web-ext-artifacts
